# CardScout — Netlify config
# Serves the static app from the repo root and runs the sealed-pricing proxy.
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Keep @netlify/blobs unbundled so the function uses Netlify's runtime module (which auto-configures Blobs).
  external_node_modules = ["@netlify/blobs"]

# Never HTTP-cache the app shell or the service worker, so users always get the latest build
# and browsers immediately pick up service-worker changes.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
